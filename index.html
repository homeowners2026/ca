                                    </div>
                                </div>

                                {/* --- HST Full Comparison --- */}
                                <div className="bg-slate-50 p-8 md:p-14 rounded-[4rem] border border-slate-200">
                                    <h1 className="text-4xl font-black text-slate-900 mb-4 text-center leading-tight">{t.hstTitle}</h1>
                                    <p className="text-slate-500 font-bold uppercase tracking-widest text-center mb-12 text-sm">Federal vs. Ontario Enhanced HST Rebate Programs</p>
                                    
                                    <div className="flex flex-wrap justify-center gap-3 mb-12 bg-white p-2.5 rounded-[2rem] shadow-sm w-fit mx-auto border border-slate-200">
                                        <button onClick={() => setHstTab('features')} className={`px-8 py-4 rounded-[1.5rem] font-black transition-all ${hstTab === 'features' ? 'bg-blue-600 text-white shadow-lg' : 'text-slate-600 hover:bg-slate-50'}`}>{t.tab1}</button>
                                        <button onClick={() => setHstTab('dates')} className={`px-8 py-4 rounded-[1.5rem] font-black transition-all ${hstTab === 'dates' ? 'bg-blue-600 text-white shadow-lg' : 'text-slate-600 hover:bg-slate-50'}`}>{t.tab2}</button>
                                        <button onClick={() => setHstTab('analysis')} className={`px-8 py-4 rounded-[1.5rem] font-black transition-all ${hstTab === 'analysis' ? 'bg-blue-600 text-white shadow-lg' : 'text-slate-600 hover:bg-slate-50'}`}>{t.tab3}</button>
                                    </div>

                                    {hstTab !== 'analysis' ? (
                                        <div className="grid md:grid-cols-2 gap-10">
                                            {['fed', 'ont'].map(col => (
                                                <div key={col} className="space-y-6">
                                                    <h2 className={`text-xl font-black text-center py-6 rounded-[2rem] border-b-8 uppercase ${col === 'fed' ? 'bg-blue-50 text-blue-800 border-blue-200' : 'bg-red-50 text-red-800 border-red-200'}`}>
                                                        {col === 'fed' ? 'Federal | Bill C-4' : 'Ontario | Budget 2026'}
                                                    </h2>
                                                    {hstData[hstTab].map((item, idx) => (
                                                        <div key={idx} className="bg-white p-7 rounded-[2rem] border border-slate-100 shadow-sm transition-all">
                                                            <div className="flex items-center gap-2 text-[10px] font-black text-slate-400 mb-2 uppercase tracking-widest">
                                                                <Icon name={item.icon} />
                                                                <span>{item.label}</span>
                                                            </div>
                                                            <div className="text-slate-900 font-black text-lg leading-snug">{col === 'fed' ? item.fed : item.ont}</div>
                                                        </div>
                                                    ))}
                                                </div>
                                            ))}
                                        </div>
                                    ) : (
                                        <div className="max-w-4xl mx-auto space-y-8">
                                            {hstData.analysis.map((item, idx) => (
                                                <div key={idx} className="bg-white p-10 rounded-[3rem] border-l-[12px] border-red-500 shadow-lg flex gap-6 items-start">
                                                    <div className="text-red-500 pt-1"><Icon name="alert" /></div>
                                                    <div>
                                                        <h3 className="text-2xl font-black text-slate-900 mb-4">{item.title}</h3>
                                                        <p className="text-xl text-slate-700 font-bold leading-relaxed">{item.desc}</p>
                                                    </div>
                                                </div>
                                            ))}
                                        </div>
                                    )}
                                </div>
                            </div>
                        )}

                        {activeSection === 'data' && (
                            <div className="space-y-16">
                                <div className="bg-blue-900 text-white p-12 md:p-20 rounded-[4rem] text-center shadow-2xl relative overflow-hidden">
                                    <h2 className="text-4xl md:text-5xl font-black mb-6">Impact Survey 2026.04</h2>
                                    <p className="text-blue-100 text-2xl font-bold mb-12">您的数据是维权最有力的武器。请参与调查。</p>
                                    <a href="https://forms.gle/PQgYgDUbb5f8zc2T7" target="_blank" className="bg-red-600 text-white px-14 py-6 rounded-full font-black text-2xl hover:bg-red-700 transition-all shadow-2xl inline-flex items-center gap-2"><Icon name="shield" /> {t.surveyBtn}</a>
                                </div>
                                <div className="grid lg:grid-cols-2 gap-12 h-[800px]">
                                    <iframe src="https://drive.google.com/file/d/1HDunrUqP90tqSgTJCgl8czfh2v0TxM6w/preview" className="w-full h-full rounded-[3rem] border-[12px] border-slate-50 shadow-2xl"></iframe>
                                    <iframe src="https://drive.google.com/file/d/14ZVAzoEM1b6xKd20z64LLS2aqncBfnK9/preview" className="w-full h-full rounded-[3rem] border-[12px] border-slate-50 shadow-2xl"></iframe>
                                </div>
                            </div>
                        )}

                        {activeSection === 'wall' && (
                            <div className="space-y-10">
                                <div className="text-center max-w-3xl mx-auto">
                                    <h2 className="text-4xl md:text-5xl font-black text-slate-900 leading-tight">Interactive Wall</h2>
                                    <p className="text-slate-400 font-black uppercase tracking-[0.5em] text-sm">Share your voice</p>
                                </div>
                                <div className="bg-white rounded-[4rem] overflow-hidden border-[16px] border-slate-50 shadow-2xl relative">
                                    <iframe src="https://padlet.com/embed/fpcaqiui3xutwmct" frameBorder="0" style={{width:'100%', height:'800px', display:'block'}}></iframe>
                                </div>
                            </div>
                        )}
                    </main>

                    <footer className="bg-slate-900 text-slate-500 py-20 border-t-[12px] border-red-600 text-center">
                        <p className="text-white font-black tracking-[0.3em] uppercase text-2xl mb-4">Ontario Homeowners For HST Fairness</p>
                        <p className="text-lg font-bold max-w-2xl mx-auto leading-relaxed text-slate-400">Protecting the rights of homeowners closing between 2024-2028.</p>
                        <div className="pt-12 flex justify-center gap-12 text-xs font-black tracking-[0.3em] text-slate-600 uppercase">
                            <span className="hover:text-red-500 cursor-pointer transition-colors">Privacy Policy</span>
                            <span>© 2024-2026 OHHF CAMPAIGN</span>
                        </div>
                    </footer>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
